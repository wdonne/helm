apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: cert
  duration: 2160h0m0s
  renewBefore: 360h0m0s
  {{- if .Values.cert.organisation }}
  subject:
    organizations:
      - {{ .Values.cert.organisation }}
  {{- end }}
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
    rotationPolicy: Always
  usages:
    - server auth
  dnsNames:
     - "{{ .Chart.Name }}.{{ .Release.Namespace }}.svc"
  {{- if .Values.cert.clusterIssuerName }}
  issuerRef:
    name: {{ .Values.cert.clusterIssuerName }}
    kind: ClusterIssuer
  {{- end }}
