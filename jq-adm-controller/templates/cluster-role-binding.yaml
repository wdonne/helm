apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/component: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Chart.Name }}
    namespace: {{ .Chart.Name }}
roleRef:
  name: {{ .Chart.Name }}
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
