apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/component: {{ .Chart.Name }}
    app.kubernetes.io/name: {{ .Chart.Name }}
rules:
  - apiGroups:
      - pincette.net
    resources:
      - mutatingpolicies
      - validatingpolicies
      - mutatingpolicies/status
      - validatingpolicies/status
    verbs:
      - "*"
  - apiGroups:
      - ""
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
